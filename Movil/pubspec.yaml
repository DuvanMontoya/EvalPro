name: movil
description: Aplicacion movil de EvalPro para rendicion de examenes con modo kiosco.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  lottie: ^3.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_windowmanager:
    path: packages/flutter_windowmanager
  wakelock_plus: ^1.2.10
  screenshot_callback:
    path: packages/screenshot_callback
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  socket_io_client: ^2.0.3+1
  intl: ^0.19.0
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.17.0
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - Entornos/dev.json
    - Entornos/stage.json
    - Entornos/prod.json
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
