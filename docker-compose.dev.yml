services:
  postgres:
    image: postgres:15-alpine
    container_name: evalpro_postgres_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USUARIO}
      POSTGRES_PASSWORD: ${POSTGRES_CONTRASENA}
      POSTGRES_DB: ${POSTGRES_BASE_DATOS}
    ports:
      - '${POSTGRES_PUERTO:-5432}:5432'
    volumes:
      - postgres_datos_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    image: node:20-bookworm
    container_name: evalpro_backend_dev
    restart: unless-stopped
    init: true
    working_dir: /workspace/Backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USUARIO}:${POSTGRES_CONTRASENA}@postgres:5432/${POSTGRES_BASE_DATOS}?schema=public
      JWT_SECRETO_ACCESO: ${JWT_SECRETO_ACCESO}
      JWT_EXPIRACION_ACCESO: ${JWT_EXPIRACION_ACCESO}
      JWT_SECRETO_REFRESH: ${JWT_SECRETO_REFRESH}
      JWT_EXPIRACION_REFRESH: ${JWT_EXPIRACION_REFRESH}
      PUERTO_APP: ${PUERTO_APP}
      CORS_ORIGENES_PERMITIDOS: ${CORS_ORIGENES_PERMITIDOS}
      ENTORNO: ${ENTORNO}
      BCRYPT_RONDAS_HASH: ${BCRYPT_RONDAS_HASH}
      ADMIN_CORREO_INICIAL: ${ADMIN_CORREO_INICIAL}
      ADMIN_CONTRASENA_INICIAL: ${ADMIN_CONTRASENA_INICIAL}
      TELEMETRIA_SEGUNDOS_MINIMOS_POR_PREGUNTA: ${TELEMETRIA_SEGUNDOS_MINIMOS_POR_PREGUNTA}
      TELEMETRIA_MAX_EVENTOS_SEGUNDO_PLANO: ${TELEMETRIA_MAX_EVENTOS_SEGUNDO_PLANO}
      NODE_ENV: development
    ports:
      - '${PUERTO_APP:-3001}:3001'
    volumes:
      - ./:/workspace
      - backend_node_modules_dev:/workspace/Backend/node_modules
    command: >
      sh -c "npm ci &&
      npx prisma generate &&
      npx prisma db push &&
      npx prisma db seed &&
      npm run start:dev"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3001/api/v1/salud\").then((r)=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 45s

  frontend:
    image: node:20-bookworm
    container_name: evalpro_frontend_dev
    restart: unless-stopped
    init: true
    working_dir: /workspace/Frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
      NEXT_PUBLIC_VERSION_APP: ${NEXT_PUBLIC_VERSION_APP}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      NODE_ENV: development
    ports:
      - '${PUERTO_FRONTEND:-3000}:3000'
    volumes:
      - ./:/workspace
      - frontend_node_modules_dev:/workspace/Frontend/node_modules
    command: >
      sh -c "npm ci &&
      npm run dev -- --webpack --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000\").then((r)=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  postgres_datos_dev:
  backend_node_modules_dev:
  frontend_node_modules_dev:
